name: Track GitHub Profile Views

on:
  schedule:
    - cron: "30 18 * * *"   # 00:00 IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-views:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Step 1: Fetch traffic data → write to views.db ──────────────────────
      - name: Sync traffic data
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_OWNER: ${{ github.repository_owner }}
          # GH_REPOS: my-project,another-repo
        run: npm run track

      # ── Step 2: Generate SVG assets from views.db ───────────────────────────
      - name: Generate SVG chart & badge
        env:
          GH_OWNER: ${{ github.repository_owner }}
        run: npm run generate-svg

      # ── Step 3: Commit everything back ──────────────────────────────────────
      - name: Commit updated assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/views.db assets/views-chart.svg assets/views-badge.svg

          if git diff --staged --quiet; then
            echo "ℹ️  No changes to commit."
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore: sync views + regen charts [$TIMESTAMP] [skip ci]"
          git push
