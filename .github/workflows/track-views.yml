name: Track GitHub Profile Views

on:
  schedule:
    # 18:30 UTC = 00:00 IST (midnight India time)
    - cron: "30 18 * * *"

  # Manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # required to commit the updated views.db

jobs:
  track-views:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install deps ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Run tracker ────────────────────────────────────────────────────────
      - name: Fetch and sync traffic data
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_OWNER: ${{ github.repository_owner }}
          # Uncomment to track additional repos:
          # GH_REPOS: my-project,another-repo
        run: npm run track

      # ── 5. Commit DB back to repo ─────────────────────────────────────────────
      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/views.db

          if git diff --staged --quiet; then
            echo "ℹ️  No new data — nothing to commit."
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore: sync views [$TIMESTAMP] [skip ci]"
          git push
